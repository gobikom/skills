# Design Skills Adapter Generation Config
# Source of truth: prompts/*.md
# Generate: python3 scripts/generate-adapters.py
#
# Follows the same pattern as prp-framework adapters.yml

adapters:
  claude-code:
    output_dir: "adapters/claude-code"
    file_pattern: "{name}/SKILL.md"
    format: md
    args_placeholder: "$ARGUMENTS"
    frontmatter:
      include: [name, description, argument-hint, allowed-tools, paths]
    allowed_tools:
      design-critique:
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_screenshot
        - mcp__claude_ai_Figma__get_metadata
        - mcp__claude_ai_Figma__get_libraries
        - mcp__claude_ai_Figma__search_design_system
        - Read
      accessibility-review:
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_screenshot
        - mcp__claude_ai_Figma__get_metadata
        - Read
        - "Bash(npx axe-core *)"
        - "Bash(npx pa11y *)"
        - "Bash(npx lighthouse *)"
      ux-writing:
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_screenshot
        - mcp__ux-copy__match_copy
        - mcp__ux-copy__generate_copy
        - mcp__ux-copy__process_screen
        - mcp__ux-copy__process_screens
        - Read
        - "Bash(grep *)"
      brand-voice:
        - mcp__ux-copy__match_copy
        - mcp__ux-copy__generate_copy
        - mcp__ux-copy__process_screen
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_screenshot
        - Read
        - "Bash(grep *)"
      design-system:
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_libraries
        - mcp__claude_ai_Figma__get_variable_defs
        - mcp__claude_ai_Figma__search_design_system
        - mcp__claude_ai_Figma__get_screenshot
        - Read
        - "Bash(grep *)"
        - "Bash(find *)"
      research-synthesis:
        - Read
        - "Bash(grep *)"
        - "Bash(wc *)"
        - "Bash(csvtool *)"
      design-handoff:
        - mcp__claude_ai_Figma__get_design_context
        - mcp__claude_ai_Figma__get_screenshot
        - mcp__claude_ai_Figma__get_metadata
        - mcp__claude_ai_Figma__get_libraries
        - mcp__claude_ai_Figma__get_variable_defs
        - mcp__claude_ai_Figma__get_code_connect_suggestions
        - Read
        - "Bash(grep *)"
        - "Bash(find *)"

  claude-skills:
    output_dir: "adapters/claude-skills"
    file_pattern: "{name}/SKILL.md"
    format: md
    args_placeholder: "$ARGUMENTS"
    frontmatter:
      include: [name, description, argument-hint, paths]

  codex:
    output_dir: "adapters/codex"
    file_pattern: "{name}/SKILL.md"
    format: md
    args_placeholder: "$ARGUMENTS"
    frontmatter:
      include: [name, description, metadata]

  gemini:
    output_dir: "adapters/gemini"
    file_pattern: "{name}.toml"
    format: toml
    args_placeholder: "{{args}}"
    frontmatter:
      include: [description]

  antigravity:
    output_dir: "adapters/antigravity"
    file_pattern: "{name}.md"
    format: md
    args_placeholder: "$ARGUMENTS"
    frontmatter:
      include: [description]

# Per-skill metadata overrides (optional)
skills:
  design-critique:
    short-description: "Design critique and feedback"
  accessibility-review:
    short-description: "WCAG 2.1 accessibility audit"
  ux-writing:
    short-description: "UX copy writing and review with MCP integration"
  brand-voice:
    short-description: "Banking Digital brand voice enforcement"
  design-system:
    short-description: "Design system management"
  research-synthesis:
    short-description: "User research synthesis"
  design-handoff:
    short-description: "Developer handoff specs"
